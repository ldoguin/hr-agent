  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr-backend
    ports:
      - "8000:8000"
    environment:
      # - CB_CONN_STRING=couchbase://couchbase
      # - CB_USERNAME=Administrator
      # - CB_PASSWORD=password
      # - DEFAULT_BUCKET=hr_demo
      - ENVIRONMENT=docker
      - WORKERS=1
      - AGENT_CATALOG_CONN_ROOT_CERTIFICATE=/app/burgundydavidluckham-root-certificate.txt
      - INDEX_DEFINITION_PATH=/app/agentcatalog_index.json
      # - SERVER_URL=http://localhost:8000/
    volumes:
      - ./backend/resumes:/app/resumes
      - ./backend/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    post_start:
      - command: ["agentc", "init"]

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hr-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  couchbase_data:
    driver: local